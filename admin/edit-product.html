<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Product - Rimbic Admin</title>

<style>
body {
  font-family: 'Inter', Arial, sans-serif;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: 80px auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.container h1 { margin-bottom: 20px; }

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
}

button {
  padding: 12px 24px;
  background: #ff6a00;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 30px;
  font-weight: 600;
  font-size: 15px;
}

button:hover { background: #1a1a2e; }

.back-link {
  display: block;
  text-align: center;
  margin-top: 16px;
  color: #6b7280;
  text-decoration: none;
}

.back-link:hover { color: #ff6a00; }

.loading { text-align: center; color: #6b7280; padding: 20px; }
</style>

</head>

<body>

<div class="container">

  <h1>✏️ Edit Product</h1>

  <div id="loading" class="loading">Loading product data...</div>

  <div id="edit-form" style="display:none;">
    <input id="name" placeholder="Product Name">
    <input id="price" placeholder="Price (₹)" type="number">
    <input id="image" placeholder="Image URL">
    <select id="category">
      <option value="General">Select Category</option>
      <option value="Cricket">🏏 Cricket</option>
      <option value="Football">⚽ Football</option>
      <option value="Basketball">🏀 Basketball</option>
      <option value="Badminton">🏸 Badminton</option>
      <option value="Gym">💪 Gym Equipment</option>
    </select>

    <button onclick="updateProduct()">Save Changes →</button>
  </div>

  <a href="dashboard.html" class="back-link">← Back to Dashboard</a>

</div>

<script>
const API_BASE = window.location.origin || "http://localhost:3000";
let productId = localStorage.getItem("editProductId");

// Load existing product data
async function loadProduct() {
  if (!productId) {
    document.getElementById("loading").innerText = "No product selected";
    return;
  }

  try {
    const res = await fetch(API_BASE + "/product/" + productId);
    const product = await res.json();

    if (product && product.name) {
      document.getElementById("name").value = product.name;
      document.getElementById("price").value = product.price;
      document.getElementById("image").value = product.image;
      document.getElementById("category").value = product.category || "General";

      document.getElementById("loading").style.display = "none";
      document.getElementById("edit-form").style.display = "block";
    } else {
      document.getElementById("loading").innerText = "Product not found";
    }
  } catch(e) {
    document.getElementById("loading").innerText = "Failed to load product. Is the server running?";
  }
}

async function updateProduct() {
  let name = document.getElementById("name").value.trim();
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value.trim();
  let category = document.getElementById("category").value;

  if (!name || !price || !image) {
    alert("Please fill all fields");
    return;
  }

  try {
    const res = await fetch(API_BASE + "/update-product/" + productId, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, price: Number(price), image, category })
    });

    const data = await res.json();
    if (data.success) {
      alert("Product Updated!");
      window.location.href = "dashboard.html";
    } else {
      alert(data.message || "Update failed");
    }
  } catch(e) {
    alert("Server not reachable");
  }
}

loadProduct();
</script>

</body>
</html>
